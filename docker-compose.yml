services:
  cf-reporting:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-}
      # Pre-configure User API token (optional – skip browser setup)
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      # Pre-configure Account API token (alternative to CF_API_TOKEN)
      - CF_ACCOUNT_TOKEN=${CF_ACCOUNT_TOKEN:-}
      # SMTP settings for email report delivery (optional – can also configure via Settings UI)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      # Optional: protect the site with a password (required when env tokens are set)
      - APP_PASSWORD=${APP_PASSWORD:-}
      # Set to "true" when behind a trusted reverse proxy
      - TRUSTED_PROXY=${TRUSTED_PROXY:-}
      # Set to "true" for HTTPS deployments
      - SECURE_COOKIES=${SECURE_COOKIES:-}
      # Data collection settings (optional)
      - COLLECTION_SCHEDULE=${COLLECTION_SCHEDULE:-0 */6 * * *}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
      # Initial backfill depth override
      - INITIAL_LOOKBACK_DAYS=${INITIAL_LOOKBACK_DAYS:-}
    volumes:
      - cf_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

volumes:
  cf_data:
